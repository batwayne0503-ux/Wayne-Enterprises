<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruce Wayne | Personal Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .serif-font { font-family: 'Times New Roman', serif; }
        body { font-family: serif; }
        .fade-element { transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
        
        /* [중요] 여기에 CSS 클래스를 위치시켜야 적용됩니다 */
        .nav-active { 
            color: #FACC15 !important; 
            transition: color 0.3s ease;
        }
    </style>
</head>
<body class="bg-white text-gray-900 min-h-[300vh]">

    <header class="fixed top-0 w-full z-50 py-6 px-8 flex justify-between items-center bg-gray-950 shadow-xl">
        <div class="flex items-center space-x-6">
            <a href="https://story.kakao.com/batwayne0503/2MqO79yjWZ8" target="_blank"><img src="image/kakaologo.png" class="w-8 h-8 opacity-80"></a>
            <nav class="flex space-x-6 uppercase tracking-widest text-xs font-semibold text-gray-300">
                <a href="#main-content" class="nav-link" data-target="main-content">HOME</a>
                <a href="#who" class="nav-link" data-target="who">WHO</a>
                <a href="#about" class="nav-link" data-target="about">ABOUT</a>
                <a href="#etc" class="nav-link" data-target="etc">ETC</a>
            </nav>
        </div>
        <nav class="uppercase tracking-widest text-xs font-semibold text-gray-300">
            <a href="/" class="flex items-center"><span class="mr-2">&larr;</span> RETURN TO MAIN</a>
        </nav>
    </header>

    <div class="fixed inset-0 flex justify-end items-center z-0 pointer-events-none">
        <img src="image/ubermensch.png" class="h-auto w-[60%] opacity-[0.15] object-contain mr-[-5%]">
    </div>

    <main id="main-content" class="fixed top-0 left-0 w-full h-screen flex items-center justify-between px-16 z-20 fade-element">
        <div class="z-20 flex flex-col justify-center">
            <h1 class="serif-font text-7xl font-bold tracking-tighter whitespace-nowrap">BRUCE WAYNE</h1>
            <h2 class="serif-font text-xl text-gray-600 mt-4 tracking-widest uppercase">
                [워커홀릭] · [부드러운 카리스마] · [아이와 동물에 약함]
            </h2>
        </div>
        <div class="absolute bottom-0 right-0 w-1/2 flex justify-end">
            <img src="image/profilemain.png" class="h-[85vh] w-auto object-contain">
        </div>
    </main>

    <div id="overlay" class="fixed inset-0 bg-gray-900 z-10 opacity-0 fade-element"></div>

    <section id="who" class="relative z-30 min-h-screen flex flex-col justify-center items-center py-20 px-16 text-white pt-[100vh]">
        <div class="flex flex-row items-center justify-between w-full max-w-6xl mb-32">
            <div class="w-1/2 bg-gray-800 h-64 flex items-center justify-center text-gray-500">IMAGE PLACEHOLDER</div>
            <div class="w-1/2 pl-16">
                <p class="text-lg leading-relaxed text-gray-300">이곳에 1사분면 내용을 작성하세요.</p>
            </div>
        </div>
        <div class="flex flex-row-reverse items-center justify-between w-full max-w-6xl">
            <div class="w-1/2 bg-gray-800 h-64 flex items-center justify-center text-gray-500">IMAGE PLACEHOLDER</div>
            <div class="w-1/2 pr-16">
                <p class="text-lg leading-relaxed text-gray-300">이곳에 3사분면 내용을 작성하세요.</p>
            </div>
        </div>
    </section>

    <script>
        // 스크롤 시 메인 페이드아웃 효과
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const main = document.getElementById('main-content');
            const overlay = document.getElementById('overlay');
            const progress = Math.min(scrollY / 600, 1);
            
            main.style.opacity = 1 - progress;
            main.style.transform = `translateY(-${progress * 50}px)`;
            main.style.pointerEvents = progress >= 1 ? 'none' : 'auto';
            overlay.style.opacity = progress * 0.8;
        });

        // 메뉴 점등 로직
        const sections = document.querySelectorAll('main, section');
        const navLinks = document.querySelectorAll('.nav-link');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    navLinks.forEach(link => link.classList.remove('nav-active'));
                    const id = entry.target.getAttribute('id');
                    const activeLink = document.querySelector(`.nav-link[data-target="${id}"]`);
                    if (activeLink) activeLink.classList.add('nav-active');
                }
            });
        }, { threshold: 0.6 });

        sections.forEach(section => observer.observe(section));
    </script>
</body>
</html>
