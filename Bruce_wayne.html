<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruce Wayne | Personal Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .serif-font { font-family: 'Times New Roman', serif; }
        body { font-family: serif; background-color: #ffffff; color: #111827; }
        /* 애니메이션 효과 */
        .fade-element { transition: opacity 0.8s ease-out, transform 0.8s ease-out; will-change: opacity, transform; }
        .nav-active { color: #FACC15 !important; transition: color 0.3s ease; }
    </style>
</head>
<body class="min-h-[300vh]">

    <header class="fixed top-0 w-full z-[100] py-6 px-8 flex justify-between items-center bg-gray-950 shadow-xl">
        <div class="flex items-center space-x-6">
            <a href="https://story.kakao.com/batwayne0503/2MqO79yjWZ8" target="_blank"><img src="image/kakaologo.png" class="w-8 h-8 opacity-80"></a>
            <nav class="flex space-x-6 uppercase tracking-widest text-xs font-semibold text-gray-300">
                <a href="#main-content" class="nav-link" data-target="main-content">HOME</a>
                <a href="#who" class="nav-link" data-target="who">WHO</a>
                <a href="#about" class="nav-link" data-target="about">ABOUT</a>
                <a href="#etc" class="nav-link" data-target="etc">ETC</a>
            </nav>
        </div>
        <nav class="uppercase tracking-widest text-xs font-semibold text-gray-300">
            <a href="/" class="flex items-center"><span class="mr-2">&larr;</span> RETURN TO MAIN</a>
        </nav>
    </header>

    <main id="main-content" class="fixed top-0 left-0 w-full h-screen flex items-center justify-between px-16 z-20 fade-element" 
          style="background-image: url('image/main-background.jpg'); background-size: cover; background-position: center;">
        <div class="z-20 flex flex-col justify-center">
            <h1 class="serif-font text-7xl font-bold tracking-tighter whitespace-nowrap">BRUCE WAYNE</h1>
            <h2 class="serif-font text-xl text-gray-600 mt-4 tracking-widest uppercase">[워커홀릭] · [부드러운 카리스마] · [아이와 동물에 약함]</h2>
            <div class="flex gap-4 mt-3 text-sm text-gray-500 font-sans tracking-wide">
                <span>[190cm]</span> <span>[93kg]</span> <span>[42세]</span> <span>[HL only]</span>
            </div>
        </div>
        <div class="absolute bottom-0 right-0 w-1/2 flex justify-end">
            <img src="image/profilemain.png" class="h-[85vh] w-auto object-contain">
        </div>
    </main>

    <div id="overlay" class="fixed inset-0 bg-gray-900 z-10 opacity-0 fade-element pointer-events-none"></div>

    <section id="who" class="relative z-10 min-h-screen pt-48 pb-32 px-16 flex flex-col items-center justify-center bg-gray-950 text-white">
        <div class="flex flex-row items-center justify-between w-full max-w-6xl mb-24">
            <div class="w-1/2 bg-gray-800 h-64 flex items-center justify-center text-gray-500">IMAGE PLACEHOLDER</div>
            <div class="w-1/2 pl-16"><p class="text-lg leading-relaxed text-gray-300">1사분면 내용</p></div>
        </div>
        <div class="flex flex-row-reverse items-center justify-between w-full max-w-6xl">
            <div class="w-1/2 bg-gray-800 h-64 flex items-center justify-center text-gray-500">IMAGE PLACEHOLDER</div>
            <div class="w-1/2 pr-16"><p class="text-lg leading-relaxed text-gray-300">3사분면 내용</p></div>
        </div>
    </section>

    <section id="about" class="relative z-20 min-h-screen pt-48 pb-32 px-16 flex flex-col items-center justify-center bg-white text-gray-900">
        <h2 class="text-4xl font-bold mb-12">ABOUT</h2>
        <ul class="space-y-6 text-xl">
            <li class="cursor-pointer hover:text-yellow-600 transition" onclick="openPopup('항목 1', '내용')">• 점 목록 1</li>
            <li class="cursor-pointer hover:text-yellow-600 transition" onclick="openPopup('항목 2', '내용')">• 점 목록 2</li>
            <li class="cursor-pointer hover:text-yellow-600 transition" onclick="openPopup('항목 3', '내용')">• 점 목록 3</li>
            <li class="cursor-pointer hover:text-yellow-600 transition" onclick="openPopup('항목 4', '내용')">• 점 목록 4</li>
        </ul>
    </section>

    <section id="etc" class="relative z-30 min-h-screen pt-48 pb-32 px-16 flex flex-col items-center justify-center bg-white text-gray-900">
        <h2 class="text-4xl font-bold mb-16 serif-font">ETC</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8 w-full max-w-6xl">
            <div class="cursor-pointer" onclick="openPopup('HIStory', '내용')"><img src="image/HIStory.JPG" class="w-full aspect-square object-cover shadow-lg"><p class="mt-4 font-semibold text-lg">HIStory</p></div>
            <div class="cursor-pointer" onclick="openPopup('Quote', '내용')"><img src="image/Quote.jpg" class="w-full aspect-square object-cover shadow-lg"><p class="mt-4 font-semibold text-lg">Quote</p></div>
            <a href="https://story.kakao.com/batwayne0503/kZMRDA3ZZaa" target="_blank"><img src="image/dodle.JPG" class="w-full aspect-square object-cover shadow-lg"><p class="mt-4 font-semibold text-lg">dodle</p></a>
            <div class="cursor-pointer" onclick="openPopup('Inspired', '내용')"><img src="image/inspired.jpg" class="w-full aspect-square object-cover shadow-lg"><p class="mt-4 font-semibold text-lg">Inspired</p></div>
        </div>
    </section>

    <script>
        const navLinks = document.querySelectorAll('.nav-link');
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const main = document.getElementById('main-content');
            const overlay = document.getElementById('overlay');
            const progress = Math.min(scrollY / 600, 1);
            
            // 애니메이션 적용
            main.style.opacity = 1 - progress;
            main.style.transform = `translateY(-${progress * 50}px)`;
            overlay.style.opacity = progress * 0.8;
            
            navLinks.forEach(link => link.classList.remove('nav-active'));
            if (scrollY < 500) document.querySelector('[data-target="main-content"]').classList.add('nav-active');
            else if (scrollY < 1300) document.querySelector('[data-target="who"]').classList.add('nav-active');
            else if (scrollY < 2100) document.querySelector('[data-target="about"]').classList.add('nav-active');
            else document.querySelector('[data-target="etc"]').classList.add('nav-active');
        });
    </script>
</body>
</html>
