<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruce Wayne | Personal Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .serif-font { font-family: 'Times New Roman', serif; }
        body { font-family: serif; }
        .fade-element { transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
    </style>
</head>
<body class="bg-white text-gray-900 min-h-[200vh]"> 
    
    <header class="fixed top-0 w-full z-50 py-6 px-8 flex justify-between items-center bg-gray-950 shadow-xl">
        <div class="flex items-center space-x-6">
            <a href="https://story.kakao.com/batwayne0503/2MqO79yjWZ8" target="_blank"><img src="image/kakaologo.png" class="w-8 h-8 opacity-80"></a>
            <nav class="flex space-x-6 uppercase tracking-widest text-xs font-semibold text-gray-300">
                <a href="#">HOME</a><a href="#">WHO</a><a href="#">ABOUT</a><a href="#">ETC</a>
            </nav>
        </div>
        <nav class="uppercase tracking-widest text-xs font-semibold text-gray-300">
            <a href="/" class="flex items-center"><span class="mr-2">&larr;</span> RETURN TO MAIN</a>
        </nav>
    </header>

    <div class="fixed inset-0 flex justify-end items-center z-0 pointer-events-none">
        <img src="image/ubermensch.png" alt="ÜBERMENSCH Logo" class="h-auto w-[60%] opacity-[0.15] object-contain mr-[-5%]">
    </div>

    <main id="main-content" class="fixed w-full h-screen flex items-center justify-between px-16 z-20 fade-element">
        <h1 class="serif-font text-7xl font-bold tracking-tighter whitespace-nowrap">BRUCE WAYNE</h1>
        <div class="absolute bottom-0 right-0 w-1/2 flex justify-end">
            <img src="image/profilemain.png" alt="Profile" class="h-[85vh] w-auto object-contain">
        </div>
    </main>

    <div id="overlay" class="fixed inset-0 bg-gray-900 z-10 opacity-0 fade-element"></div>

    <script>
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const main = document.getElementById('main-content');
            const overlay = document.getElementById('overlay');
            
            // 1. 변화 범위를 600px로 늘려서 반응 속도를 늦춤 (6번 스크롤 대응)
            const progress = Math.min(scrollY / 600, 1);
            
            // 2. 전경(이름/사진)은 100% 사라짐
            main.style.opacity = 1 - progress;
            main.style.transform = `translateY(-${progress * 50}px)`;
            
            // 3. 오버레이 배경 투명도 제한: 1(완전 검정)이 아닌 0.8 정도로 설정
            // 이렇게 하면 뒤의 로고가 0.15 * 0.2 = 0.03 정도로 은은하게 계속 비침
            overlay.style.opacity = progress * 0.8;
        });
    </script>
</body>
</html>
