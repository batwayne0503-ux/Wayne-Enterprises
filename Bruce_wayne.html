<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruce Wayne | Personal Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media (max-width: 768px) {
            .main-container { flex-direction: column; text-align: center; }
            .name-title { font-size: 3rem; white-space: normal; }
            .profile-img-container { margin-top: 2rem; justify-content: center; }
        }
    </style>
</head>
<body class="bg-white text-gray-900 font-sans h-screen flex flex-col relative overflow-hidden">
    
  <!-- 상단 바 전체를 bg-gray-950 박스로 묶어 영역 구분 -->
<div class="bg-gray-950 w-full relative z-20 shadow-xl">
    
    <!-- 네비게이션: RETURN TO MAIN을 우측 끝에 독점 배치 -->
    <nav class="p-8 flex justify-between items-center uppercase tracking-widest text-xs font-semibold">
        
        <!-- [좌측 영역]: 카카오 로고(6x6 확대) + 메인 메뉴 그룹 -->
        <div class="flex items-center space-x-8 text-gray-300">
            <a href="https://story.kakao.com/batwayne0503/2MqO79yjWZ8" target="_blank" rel="noopener noreferrer" class="hover:opacity-70 transition-opacity">
                <img src="image/kakaologo.png" alt="Kakao Story" class="w-6 h-6 object-contain">
            </a>
            <a href="#" class="hover:text-white transition-colors">HOME</a>
            <a href="#" class="hover:text-white transition-colors">WHO</a>
            <a href="#" class="hover:text-gray-400 transition-colors">ABOUT</a>
            <a href="#" class="hover:text-gray-400 transition-colors">ETC</a>
        </div>
        
        <!-- [우측 영역]: 좌측 화살표 적용 -->
        <div class="text-gray-300">
            <a href="/" title="Return to Main" class="hover:text-white transition-colors flex items-center tracking-widest">
                <span class="mr-2 text-base leading-none">&larr;</span> RETURN TO MAIN
            </a>
        </div>
    </nav>
</div>

<!-- [메인 콘텐츠]: 의장님이 추가하신 main 태그 구조 반영 -->
<main class="w-full relative z-10 min-h-screen bg-transparent">
    <div class="w-full flex flex-col items-center justify-center pb-12 relative min-h-[600px]">
        
        <!-- 초인 로고: 투명도 35%로 조정 -->
        <div class="absolute inset-0 flex items-center justify-center opacity-35 pointer-events-none select-none">
            <span class="text-[12rem] font-black tracking-tighter text-gray-800">ÜBERMENSCH</span>
        </div>

        <!-- Profilemain.png: 사이즈 확대 적용 -->
        <div class="relative z-10 mt-4">
            <img src="image/Profilemain.png" alt="Bruce Wayne Profile" class="max-w-xl h-auto object-contain drop-shadow-2xl transition-all duration-300">
        </div>
        
    </div>
</main>
    <footer class="p-10 flex justify-between items-center text-xs text-gray-400 absolute w-full bottom-0 z-20">
        <span>SCROLL TO DISCOVER</span>
    </footer>
</body>
</html>
