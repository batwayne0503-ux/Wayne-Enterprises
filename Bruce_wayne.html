<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruce Wayne | Personal Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap');
        
        .serif-font { font-family: 'Times New Roman', serif; }
        body { font-family: serif; }
    </style>
</head>
<body class="bg-white text-gray-900 h-screen flex flex-col overflow-hidden">
    
    <!-- 수정된 헤더: 카카오 로고와 메뉴 항목들 -->
    <header class="fixed top-0 w-full z-30 py-6 px-8 flex justify-between items-center">
        <div class="flex items-center space-x-6">
            <a href="https://story.kakao.com/batwayne0503/2MqO79yjWZ8" target="_blank" rel="noopener noreferrer">
                <img src="image/kakaologo.png" alt="Kakao Story" class="w-8 h-8 opacity-80 hover:opacity-100 transition-opacity">
            </a>
            <nav class="flex space-x-6 uppercase tracking-widest text-xs font-semibold text-gray-500">
                <a href="#" class="hover:text-black transition-colors">HOME</a>
                <a href="#" class="hover:text-black transition-colors">WHO</a>
                <a href="#" class="hover:text-black transition-colors">ABOUT</a>
                <a href="#" class="hover:text-black transition-colors">ETC</a>
            </nav>
        </div>
        <nav class="uppercase tracking-widest text-xs font-semibold text-gray-300">
            <a href="/" class="hover:text-white transition-colors flex items-center">
                <span class="mr-2">&larr;</span> RETURN TO MAIN
            </a>
        </nav>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="w-full h-screen relative flex items-center justify-between px-16">
        
        <!-- 좌측: BRUCE WAYNE 텍스트 -->
        <div class="z-20">
            <h1 class="serif-font text-7xl font-bold tracking-tighter">BRUCE WAYNE</h1>
        </div>

        <!-- 배경: ÜBERMENSCH 로고 -->
        <div class="absolute inset-0 flex justify-end items-center z-0 pointer-events-none">
            <img src="image/ubermensch.png" alt="ÜBERMENSCH Logo" class="h-auto w-[60%] opacity-20 object-contain mr-[-5%]">
        </div>

        <!-- 우측: 프로필 이미지 -->
        <div class="absolute bottom-0 right-0 z-10 w-1/2 flex justify-end">
            <img src="image/profilemain.png" alt="Bruce Wayne Profile" class="h-[85vh] w-auto object-contain drop-shadow-2xl">
        </div>
    </main>

    <footer class="fixed bottom-10 left-10 z-30 text-xs text-gray-400">
        <span>SCROLL TO DISCOVER</span>
    </footer>
</body>
</html>
